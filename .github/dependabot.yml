version: 2
registries:
  artifactory:
    type: npm-registry
    url: https://na.artifactory.swg-devops.com/artifactory/sec-cloud-identity-common-rel-npm-virtual/
    username: ${{secrets.ARTIFACTORY_USERNAME}}
    password: ${{secrets.ARTIFACTORY_PASSWORD}}

updates:
  # Main package dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    registries:
      - artifactory
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Demo package dependencies
  - package-ecosystem: "npm"
    directory: "/demo"
    schedule:
      interval: "weekly"
      day: "monday"
    registries:
      - artifactory
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "demo"
    commit-message:
      prefix: "chore"
      include: "scope"
